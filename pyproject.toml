[project]
name = "metatab"
version = "0.1"
dependencies = [
    "tabpfn>=2.0.6",
    "scikit-learn>=1.2.0,<1.7",
    "pandas==2.2.3",
    "numpy>=2.1.3",
    "torch==2.6.0"
]


[tool.setuptools]
# utils is there for testing purposes
packages = ["metatab", "pretrained_metatab", "utils"] 
package-dir = {"" = "src"}


[project.scripts]
metatab = "metatab:main.main"
pmetatab = "pretrained_metatab:main.main"


[build-system]
requires = ["setuptools", "wheel"]
build-backend = "setuptools.build_meta"
