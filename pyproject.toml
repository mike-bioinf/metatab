[project]
name = "metatab"
version = "0.1"
dependencies = [
    "numpy>=2.1.3",
    "pandas>=2.2.3",
    "scikit-learn>=1.2.0,<1.7",
    "hyperopt>=0.2.7",
    "torch>=2.6.0",
    "xgboost>=3.0.2",
    "catboost>=1.2.8",
    "lightgbm>=4.6.0",
    "tabpfn>=2.1.0"
]


[project.optional-dependencies]
dev = ["pytest"]


[project.scripts]
metatab-fit = "fit:fit.main"
metatab-predict = "predict:predict.main"
metatab-resample = "resample:resample.main"


[build-system]
requires = ["setuptools", "wheel"]
build-backend = "setuptools.build_meta"


[tool.pytest.ini_options]
# filter hyperopt warnings
filterwarnings = [
    'ignore:.*pkg_resources is deprecated as an API.*',
    'ignore:.*datetime.datetime.utcnow\(\) is deprecated and scheduled for removal.*'
]