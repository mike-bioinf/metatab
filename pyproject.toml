[project]
name = "metatab"
version = "0.1"
dependencies = [
    "numpy>=2.1.3",
    "pandas>=2.2.3",
    "scikit-learn>=1.2.0,<1.7",
    "hyperopt>=0.2.7",
    "torch>=2.6.0",
    "xgboost>=3.0.2",
    "catboost>=1.2.8",
    "lightgbm>=4.6.0",
    "joblib==1.5.1",  # the exact version assures the deserialization of the surrogate random forests database
    "ray>=2.31.0,<2.45.0",  # for autotabpfn that relies on autogluon
    "tabpfn==2.1.3",  # our finetune program relies on this specific version
    # install directly from github the finetunetabpfn package
    # "finetunetabpfn@git+https://github.com/mike-bioinf/finetunetabpfn.git@main"
]


[project.optional-dependencies]
dev = ["pytest"]


[project.scripts]
metatab-fit = "fit.fit:main"
metatab-predict = "predict.predict:main"
metatab-resample = "resample.resample:main"
metatab-meta-random-search = "_paper.hp_metalearning.programs.random_search:main"
metatab-fit-surrogate = "_paper.hp_metalearning.programs.fit_surrogate:main"


[build-system]
requires = ["setuptools", "wheel"]
build-backend = "setuptools.build_meta"


[tool.pytest.ini_options]
filterwarnings = [
    # filter hyperopt warnings
    'ignore:.*pkg_resources is deprecated as an API.*',
    'ignore:.*datetime.datetime.utcnow\(\) is deprecated and scheduled for removal.*',
    # filter deprecation pkg_resources warnings
    'ignore:.*pkg_resources.*:DeprecationWarning'
]