[project]
name = "runtabpfn"
version = "0.1"
dependencies = [
    "tabpfn>=2.0.6",
    "scikit-learn>=1.2.0,<1.7",
    "pandas>=2.2.3",
    "numpy>=2.1.3",
    "torch>=2.6.0",
    "xgboost>=3.0.2",
    "scipy>=1.16.0"
]


[project.scripts]
metatab = "runtabpfn:main.main"


[build-system]
requires = ["setuptools", "wheel"]
build-backend = "setuptools.build_meta"