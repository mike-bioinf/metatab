[project]
name = "metatab"
version = "0.1"
requires-python = ">=3.9"
dependencies = [
    "numpy>=2.1.3",
    "pandas>=2.2.3",
    "platformdirs>=4.3.8",
    "requests>=2.32.4",
    "scikit-learn>=1.2.0,<1.7",
    "hyperopt>=0.2.7",
    "pymfe>=0.4.4",
    "torch>=2.6.0",
    "xgboost>=3.0.2",
    "catboost>=1.2.8",
    "lightgbm>=4.6.0",
    "pydantic>=2.12.5",
    "joblib==1.5.1",  # the exact version assures the deserialization of the surrogate models ?
    "tabpfn==2.1.3",  #TODO: update. Our checkpoint download process rely on this specific version for now.
]


[project.optional-dependencies]
dev = [
    "pytest>=8.4.1"
]

paper = [
    "seaborn>=0.13.2",
    "matplotlib>=3.10.3",
    "adjustText>=1.3.0",
    "statannotations>=0.7.2",
    "scipy>=1.16.0"
]


[project.scripts]
metatab-fit = "cli.programs.fit.fit:main"
metatab-predict = "cli.programs.predict.predict:main"
metatab-resample = "cli.programs.resample.resample:main"
metatab-opt-search = "cli.programs.metalearning.opt_search:main"
metatab-prepare-metadata = "cli.programs.metalearning.prepare_metadata:main"
metatab-fit-surrogate = "cli.programs.metalearning.fit_surrogate:main"
metatab-fit-surrogate-loo = "cli.programs.metalearning.fit_surrogate_loo:main"


[build-system]
requires = ["setuptools", "wheel"]
build-backend = "setuptools.build_meta"


[tool.pytest.ini_options]
filterwarnings = [
    # filter hyperopt warnings
    'ignore:.*pkg_resources is deprecated as an API.*',
    'ignore:.*datetime.datetime.utcnow\(\) is deprecated and scheduled for removal.*',
    # filter deprecation pkg_resources warnings
    'ignore:.*pkg_resources.*:DeprecationWarning'
]
